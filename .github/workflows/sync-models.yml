name: sync-models

# Weekly refresh of the vendored models.dev catalog. Runs the sync task, and if
# src/llmdb/data/models.json (or the bumped LLMDB::VERSION) changed, opens a PR.
on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: "1.20.2"

      - name: Sync models from models.dev
        run: crystal run tasks/sync_models.cr

      - name: Verify catalog still compiles and specs pass
        run: crystal spec

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain src/llmdb/data/models.json src/llmdb.cr)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-models
          commit-message: "chore: sync models.dev catalog"
          title: "chore: sync models.dev catalog"
          body: |
            Automated weekly sync of the vendored models.dev catalog.

            Generated by `crystal run tasks/sync_models.cr` (see `.github/workflows/sync-models.yml`).
          labels: automated, models
          delete-branch: true
